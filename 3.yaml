rules:
  - RULE-SET,private-ips,DIRECT,no-resolve
  - GEOSITE,private,DIRECT
  - IP-CIDR,::/0,REJECT-DROP,no-resolve
  - GEOSITE,category-ads-all,REJECT
  - GEOSITE,category-ru,DIRECT
  - RULE-SET,whitelist,DIRECT
  - RULE-SET,supercell,DIRECT
  - GEOIP,ru,DIRECT,no-resolve
  - GEOSITE,youtube,PROXY
  - GEOSITE,google,DIRECT
  - GEOSITE,openai,DIRECT
  - GEOSITE,anthropic,DIRECT
  - GEOSITE,spotify,DIRECT
  - GEOSITE,pinterest,DIRECT
  - GEOSITE,twitch,DIRECT
  - MATCH,PROXY

rule-providers:
  private-ips:
    type: http
    behavior: ipcidr
    format: mrs
    url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geoip/private.mrs"
    path: ./rules/private.mrs
    interval: 2592000
  whitelist:
    type: http
    behavior: domain
    format: mrs
    url: https://cdn.jsdelivr.net/gh/hydraponique/roscomvpn-geosite/release/mihomo/whitelist.mrs
    path: ./ruleset/whitelist.mrs
    interval: 86400
  supercell:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/luxxuria/harvester@main/supercell.list"
    path: ./rules/supercell.list
    interval: 86400
