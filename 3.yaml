mixed-port: 33333
allow-lan: false
bind-address: "*"
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true
geodata-mode: false
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24
geox-url:
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  geosite: "https://raw.githubusercontent.com/runetfreedom/russia-blocked-geosite/release/geosite.dat"

secret: mihomo
external-ui: ui # ----> http://127.0.0.1:33332/ui <----
external-ui-url: https://github.com/MetaCubeX/metacubexd/releases/latest/download/compressed-dist.tgz
external-controller: 127.0.0.1:33332

dns:
  enable: true
  cache-algorithm: arc
  prefer-h3: false
  use-hosts: false
  use-system-hosts: true
  respect-rules: false
  listen: 0.0.0.0:1053
  ipv6: false
  default-nameserver:
    - '45.155.204.190'
    - '111.88.96.50'
    - '8.8.8.8'
    - '1.1.1.1'
  enhanced-mode: 'fake-ip'
  fake-ip-range: '198.18.0.1/16'
  fake-ip-filter-mode: 'blacklist'
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - 'localhost'
  nameserver-policy:
    'geosite:google-deepmind,openai,spotify,twitch,anthropic':
      - 'https://xbox-dns.ru/dns-query'
      - 'https://dns.geohide.ru:8443'
    'rule-set:supercell':
      - 'https://supercell.xbox-dns.ru/dns-query'
  nameserver:
    - 'https://dns.geohide.ru:444/dns-query'
    - 'https://xbox-dns.ru/dns-query'
    - 'https://8.8.8.8/dns-query'
    - 'https://1.1.1.1/dns-query'

sniffer:
  enable: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 8080-8880]
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

