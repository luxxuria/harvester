mixed-port: 33333
bind-address: "127.0.0.1"
allow-lan: false
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"

secret: mihomo
external-ui: ui # --> http://127.0.0.1:33332/ui/#/setup?hostname=127.0.0.1&port=33332&secret=mihomo <--
external-ui-url: https://github.com/MetaCubeX/metacubexd/releases/latest/download/compressed-dist.tgz
external-controller: 127.0.0.1:33332

dns:
  enable: true
  cache-algorithm: arc
  prefer-h3: false
  use-hosts: false
  use-system-hosts: false
  respect-rules: false
  listen: 0.0.0.0:1053
  ipv6: false
  default-nameserver:
    - 45.155.204.190 # geohide
    - 111.88.96.50 # xbox
    - 8.8.8.8
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: rule
  fake-ip-filter:
    - GEOSITE,private,real-ip
    - MATCH,fake-ip
  nameserver-policy:
    'geosite:google-deepmind,openai,spotify,twitch,anthropic':
      - https://dns.geohide.ru:444/dns-query
      - https://xbox-dns.ru/dns-query
  nameserver:
    - https://dns.geohide.ru:444/dns-query
    - https://xbox-dns.ru/dns-query
    - https://dns.google/dns-query

sniffer:
  enable: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 8080-8880]
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

health_check: &health_check
  health-check:
    enable: true
    url: https://connectivitycheck.gstatic.com/generate_204
    interval: 60
    timeout: 3000
    lazy: true

url_test: &url_test
  type: url-test
  url: https://connectivitycheck.gstatic.com/generate_204
  interval: 60
  lazy: true
  timeout: 3000
  max-failed-times: 3
  tolerance: 50

proxy-providers:
  warp_provider:
    type: http
    url: https://fastly.jsdelivr.net/gh/luxxuria/harvester@main/warp-endpoints.list
    path: ./providers/warp-endpoints.yaml
    interval: 72000
    <<: *health_check
  speed_tested:
    type: http
    url: "https://cdn.jsdelivr.net/gh/luxxuria/harvester@main/speed_tested.txt"
    path: ./providers/speed_tested.yaml
    interval: 3600
    <<: *health_check
  ig1:
    type: http
    url: "https://cdn.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/Vless-Reality-White-Lists-Rus-Mobile.txt"
    path: ./providers/ig1.yaml
    interval: 3600
    <<: *health_check
  ig2:
    type: http
    url: "https://cdn.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/Vless-Reality-White-Lists-Rus-Mobile-2.txt"
    path: ./providers/ig2.yaml
    interval: 3600
    <<: *health_check


proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - warp-auto
      - warp-select
      - custom
      - igareck
  - name: warp-auto
    <<: *url_test
    use:
      - warp_provider
  - name: warp-select
    type: select
    use:
      - warp_provider
  - name: custom
    <<: *url_test
    use:
      - speed_tested
  - name: igareck
    <<: *url_test
    use:
      - ig1
      - ig2


rules:
  - RULE-SET,private-ips,DIRECT,no-resolve
  - GEOSITE,private,DIRECT
  - IP-CIDR,::/0,REJECT,no-resolve
  - GEOSITE,category-ads-all,REJECT
  - GEOSITE,category-ru,DIRECT
  - RULE-SET,whitelist,DIRECT
  - GEOSITE,youtube,PROXY
  - GEOSITE,google,DIRECT
  - GEOSITE,openai,DIRECT
  - GEOSITE,anthropic,DIRECT
  - GEOSITE,spotify,DIRECT
  - GEOSITE,twitch,DIRECT
  - GEOSITE,pinterest,DIRECT
  - MATCH,PROXY

rule-providers:
  private-ips:
    type: http
    behavior: ipcidr
    format: mrs
    url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geoip/private.mrs"
    path: ./ruleset/private-ips.mrs
    interval: 2592000
  whitelist:
    type: http
    behavior: domain
    format: mrs
    url: https://fastly.jsdelivr.net/gh/hydraponique/roscomvpn-geosite/release/mihomo/whitelist.mrs
    path: ./ruleset/whitelist.mrs
    interval: 86400
