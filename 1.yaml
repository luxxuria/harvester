authentication:
  - "local:4f9A2b8C1E7d6F3G5h0J9k2L4M1n7P8q5R3t6V0w9X2y4Z1A7b9C"

proxy-providers:
  all_provider:
    type: http
    url: "https://github.com/luxxuria/harvester/raw/refs/heads/main/speed_tested.txt"
    interval: 3600
    path: ./my_proxies.yaml
    health-check:
      enable: true
      interval: 60
      url: "https://connectivitycheck.gstatic.com/generate_204"
proxy-groups:
  - name: "PROXY"
    type: url-test
    url: "https://connectivitycheck.gstatic.com/generate_204"
    interval: 30
    tolerance: 100
    timeout: 3000
    lazy: false
    use:
      - all_provider

dns:
  enable: true
  cache-algorithm: arc
  use-hosts: false
  use-system-hosts: false
  respect-rules: false
  listen: 0.0.0.0:1053
  ipv6: false
  default-nameserver:
    - '8.8.8.8'
    - '1.1.1.1'
  enhanced-mode: 'fake-ip'
  fake-ip-range: '198.18.0.1/16'
  fake-ip-filter-mode: 'blacklist'
  fake-ip-filter:
    - '*.lan'
  nameserver:
    - 'https://8.8.8.8/dns-query'
    - 'https://1.1.1.1/dns-query'
  direct-nameserver:
    - 'https://xbox-dns.ru/dns-query'

rules:
  #- MATCH,PROXY #whitelist
  - RULE-SET,private-ips,DIRECT,no-resolve
  - RULE-SET,private-domains,DIRECT
  - RULE-SET,category-ads,REJECT-DROP
  - RULE-SET,win-spy,REJECT-DROP
  - PROCESS-NAME,com.google.android.youtube,PROXY
  - PROCESS-NAME,org.telegram.messenger,PROXY
  - PROCESS-NAME,com.whatsapp,PROXY
  - PROCESS-NAME,com.google.android.googlequicksearchbox,DIRECT
  - GEOSITE,youtube,PROXY
  - GEOSITE,google,DIRECT
  - GEOIP,google,DIRECT,no-resolve
  - RULE-SET,twitch,DIRECT
  - RULE-SET,microsoft,DIRECT
  - RULE-SET,apple,DIRECT
  - RULE-SET,pinterest,DIRECT
  - RULE-SET,category-ru,DIRECT
  - RULE-SET,whitelist,DIRECT
  - RULE-SET,direct-ips,DIRECT
  - IP-CIDR,::/0,REJECT-DROP,no-resolve
  - MATCH,PROXY

rule-providers:
  private-domains:
    type: http
    behavior: domain
    format: mrs
    url: https://cdn.jsdelivr.net/gh/hydraponique/roscomvpn-geosite/release/mihomo/private.mrs
    path: ./ruleset/geosite-private.mrs
    proxy: PROXY
    interval: 2592000
