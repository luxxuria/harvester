mixed-port: 33333
authentication:
  - "local:Lnn8pw8AMirTmU7AXO2m8f29QQPa6XHUeRXuKO6Uxy69zZPDy7ZsfQ5Pli1wi4Bo"
allow-lan: false
bind-address: "*"
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true
geodata-mode: false
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24
geox-url:
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"

secret: mihomo
external-ui: ui # ----> http://127.0.0.1:33332/ui <----
external-ui-url: https://github.com/MetaCubeX/metacubexd/releases/latest/download/compressed-dist.tgz
external-controller: 127.0.0.1:33332

dns:
  enable: true
  cache-algorithm: arc
  prefer-h3: false
  use-hosts: false
  use-system-hosts: false
  respect-rules: false
  listen: 0.0.0.0:1053
  ipv6: false
  default-nameserver:
    - '45.155.204.190'
    - '111.88.96.50'
    - '8.8.8.8'
    - '1.1.1.1'
  enhanced-mode: 'fake-ip'
  fake-ip-range: '198.18.0.1/16'
  fake-ip-filter-mode: 'blacklist'
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - 'localhost'
  nameserver-policy:
    'geosite:google-deepmind,openai,spotify,twitch,anthropic':
      - 'https://xbox-dns.ru/dns-query'
      - 'https://dns.geohide.ru:444/dns-query'
  nameserver:
    - 'https://dns.geohide.ru:444/dns-query'
    - 'https://xbox-dns.ru/dns-query'
    - 'https://8.8.8.8/dns-query'
    - 'https://1.1.1.1/dns-query'

sniffer:
  enable: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 8080-8880]
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

proxy-providers:
  ig1:
    type: http
    url: "https://cdn.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/Vless-Reality-White-Lists-Rus-Mobile.txt"
    interval: 3600
    path: ./providers/ig1.yaml
    health-check:
      enable: true
      interval: 600
      url: "https://connectivitycheck.gstatic.com/generate_204"
  ig2:
    type: http
    url: "https://cdn.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/Vless-Reality-White-Lists-Rus-Mobile-2.txt"
    interval: 3600
    path: ./providers/ig2.yaml
    health-check:
      enable: true
      interval: 600
      url: "https://connectivitycheck.gstatic.com/generate_204"
  zieng2:
    type: http
    url: "https://cdn.jsdelivr.net/gh/zieng2/wl@main/vless_universal.txt"
    interval: 3600
    path: ./providers/zieng2.yaml
    health-check:
      enable: true
      interval: 600
      url: "https://connectivitycheck.gstatic.com/generate_204"
  my_wl:
    type: http
    url: "https://cdn.jsdelivr.net/gh/luxxuria/harvester@main/speed_tested.txt"
    interval: 3600
    path: ./providers/my_wl.yaml
    health-check:
      enable: true
      interval: 600
      url: "https://connectivitycheck.gstatic.com/generate_204"

proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - my_wl
      - igareck
      - zieng2
  - name: my_wl
    type: url-test
    url: "https://connectivitycheck.gstatic.com/generate_204"
    interval: 600
    tolerance: 50
    timeout: 3000
    use:
      - my_wl
  - name: igareck
    type: url-test
    url: "https://connectivitycheck.gstatic.com/generate_204"
    interval: 600
    tolerance: 50
    timeout: 3000
    use:
      - ig1
      - ig2
  - name: zieng2
    type: url-test
    url: "https://connectivitycheck.gstatic.com/generate_204"
    interval: 600
    tolerance: 50
    timeout: 3000
    use:
      - zieng2

rules:
  - RULE-SET,private-ips,DIRECT,no-resolve
  - GEOSITE,private,DIRECT
  - IP-CIDR,::/0,REJECT,no-resolve
  - GEOSITE,category-ads-all,REJECT
  - GEOSITE,category-ru,DIRECT
  - RULE-SET,whitelist,DIRECT
  - GEOIP,ru,DIRECT,no-resolve
  - GEOSITE,youtube,PROXY
  - GEOSITE,google,DIRECT
  - GEOSITE,openai,DIRECT
  - GEOSITE,anthropic,DIRECT
  - GEOSITE,spotify,DIRECT
  - GEOSITE,pinterest,DIRECT
  - GEOSITE,twitch,DIRECT
  - MATCH,PROXY

rule-providers:
  private-ips:
    type: http
    behavior: ipcidr
    format: mrs
    url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geoip/private.mrs"
    path: ./rules/private.mrs
    interval: 2592000
  whitelist:
    type: http
    behavior: domain
    format: mrs
    url: https://cdn.jsdelivr.net/gh/hydraponique/roscomvpn-geosite/release/mihomo/whitelist.mrs
    path: ./ruleset/whitelist.mrs
    interval: 86400
