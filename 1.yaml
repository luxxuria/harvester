authentication:
  - "local:JRZhF4SwTvdWDAyu3NTvZWr1dR8jM2nuDdGUyteCs8NngPgSBB9XftgeWLgmTPa4"

dns:
  enable: true
  cache-algorithm: arc
  use-hosts: false
  use-system-hosts: false
  respect-rules: false
  listen: 0.0.0.0:1053
  ipv6: false
  default-nameserver:
    - '8.8.8.8'
    - '1.1.1.1'
  enhanced-mode: 'fake-ip'
  fake-ip-range: '198.18.0.1/16'
  fake-ip-filter-mode: 'blacklist'
  fake-ip-filter:
    - '*.lan'
  nameserver:
    - 'https://8.8.8.8/dns-query'
    - 'https://1.1.1.1/dns-query'
  nameserver-policy:
    'geosite:google,openai,spotify,twitch': 'https://xbox-dns.ru/dns-query'

proxy-providers:
  ig1:
    type: http
    url: "https://cdn.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/Vless-Reality-White-Lists-Rus-Mobile.txt"
    interval: 3600
    health-check:
      enable: true
      interval: 600
      url: "https://connectivitycheck.gstatic.com/generate_204"
  ig2:
    type: http
    url: "https://cdn.jsdelivr.net/gh/igareck/vpn-configs-for-russia@main/Vless-Reality-White-Lists-Rus-Mobile-2.txt"
    interval: 3600
    health-check:
      enable: true
      interval: 600
      url: "https://connectivitycheck.gstatic.com/generate_204"
  my_wl:
    type: http
    url: "https://cdn.jsdelivr.net/gh/luxxuria/harvester@main/speed_tested.txt"
    interval: 3600
    health-check:
      enable: true
      interval: 600
      url: "https://connectivitycheck.gstatic.com/generate_204"
  my_bl:
    type: http
    url: "https://cdn.jsdelivr.net/gh/luxxuria/harvester@main/non_ru.txt"
    interval: 3600
    health-check:
      enable: true
      interval: 600
      url: "https://connectivitycheck.gstatic.com/generate_204"

proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - my_bl
      - my_wl
      - ig
  - name: my_bl
    type: url-test
    url: "https://connectivitycheck.gstatic.com/generate_204"
    interval: 600
    tolerance: 100
    timeout: 3000
    use:
      - my_bl
  - name: my_wl
    type: url-test
    url: "https://connectivitycheck.gstatic.com/generate_204"
    interval: 600
    tolerance: 100
    timeout: 3000
    use:
      - my_wl
  - name: ig
    type: url-test
    url: "https://connectivitycheck.gstatic.com/generate_204"
    interval: 600
    tolerance: 100
    timeout: 3000
    use:
      - ig1
      - ig2

rules:
  #- MATCH,PROXY #whitelist
  - RULE-SET,private-ips,DIRECT,no-resolve
  - RULE-SET,private-domains,DIRECT
  - IP-CIDR,::/0,REJECT-DROP,no-resolve
  - RULE-SET,category-ads,REJECT-DROP
  - PROCESS-NAME,org.telegram.messenger,PROXY
  - PROCESS-NAME,com.whatsapp,PROXY
  - PROCESS-NAME,com.google.android.youtube,PROXY
  - PROCESS-NAME,com.android.vending,PROXY
  - SUB-RULE,(PROCESS-NAME,com.android.chrome),browser-rules
  - MATCH,DIRECT

sub-rules:
  browser-rules:
  - RULE-SET,whitelist,DIRECT
  - RULE-SET,direct-ips,DIRECT
  - RULE-SET,category-ru,DIRECT
  - RULE-SET,ru-whitelist,DIRECT,no-resolve
  - RULE-SET,ddos-guard,DIRECT,no-resolve
  - GEOIP,ru,DIRECT,no-resolve
  - GEOSITE,youtube,PROXY
  - GEOSITE,google,DIRECT
  - GEOSITE,openai,DIRECT
  - GEOSITE,spotify,DIRECT
  - GEOSITE,twitch,DIRECT
  - RULE-SET,pinterest,DIRECT
  - GEOIP,youtube,PROXY,no-resolve
  - GEOIP,google,DIRECT,no-resolve
  - MATCH,PROXY

rule-providers:
  ru-whitelist:
    type: http
    behavior: ipcidr
    format: mrs
    url: https://raw.githubusercontent.com/runetfreedom/russia-blocked-geoip/release/mrs/ru-whitelist.mrs
    path: ./ruleset/ru-whitelist.mrs
    proxy: PROXY
    interval: 86400
  ddos-guard:
    type: http
    behavior: ipcidr
    format: mrs
    url: https://raw.githubusercontent.com/runetfreedom/russia-blocked-geoip/release/mrs/ddos-guard.mrs
